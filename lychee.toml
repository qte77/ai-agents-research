# Lychee link checker config
# https://lychee.cli.rs/configuration/

# Exclude auto-generated and archived content
# triage/ — auto-generated monitor outputs (see CONTRIBUTING.md)
# docs/archive/ — historical snapshots with known-broken cross-refs (moved from docs/todo/ per #105)
exclude_path = ["triage/", "docs/archive/"]

# Accept common bot-blocked status codes
# 405 = HEAD method not allowed (status pages often reject HEAD)
# 418 = I'm a teapot (freedesktop.org bot-block)
accept = [200, 429, 405, 418, 202, 415]

# Exclude domains that block automated requests (return 403/401 to HEAD)
exclude = [
    "medium.com",
    "npmjs.com",
    "cuttlesoft.com",
    "linearb.io",
    "hashicorp.com",
    "epam.com",
    "thectoclub.com",
    "blogs.oracle.com",
    "netsuite.com",
    "mcp.stripe.com",
    "dl.acm.org",
    "oxford.universitypressscholarship.com",
    "agentverse.ai",
    "crunchbase.com",
    "openreview.net",
    "scite.ai",
    # Bot-blocking / Cloudflare-protected
    "reddit.com",
    "substack.com",
    "blog.jetbrains.com",
    "neptune.ai",
    # Auth-gated (requires login)
    "claude.ai/code/scheduled",
    # Timeout-prone marketing sites (heavy JS homepages or JS-rendered)
    "agentskills.io",
    "e2b.dev",
    "modelcontextprotocol.io",
    "devin.ai",
    "cognition.ai",
    "deepwiki.com",
    "minbook.dev",
    "emdash.dev",
]
