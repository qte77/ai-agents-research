# Lychee link checker config
# https://lychee.cli.rs/configuration/

# Exclude auto-generated and archived content
# triage/ — auto-generated monitor outputs (see CONTRIBUTING.md)
# docs/todo/ — archived Agents-eval era docs (status: archived frontmatter); see #105
exclude_path = ["triage/", "docs/todo/"]

# Accept common bot-blocked status codes
accept = [200, 429]

# Exclude domains that block automated requests (return 403/401 to HEAD)
exclude = [
    "medium.com",
    "npmjs.com",
    "cuttlesoft.com",
    "linearb.io",
    "hashicorp.com",
    "epam.com",
    "thectoclub.com",
    "blogs.oracle.com",
    "netsuite.com",
    "mcp.stripe.com",
    "dl.acm.org",
    "oxford.universitypressscholarship.com",
    "agentverse.ai",
    "crunchbase.com",
    "openreview.net",
    "scite.ai",
]
