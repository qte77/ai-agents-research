# Lychee link checker config
# https://lychee.cli.rs/configuration/

# Exclude auto-generated and archived content
# triage/ — auto-generated monitor outputs (see CONTRIBUTING.md)
# docs/archive/ — historical snapshots with known-broken cross-refs (moved from docs/todo/ per #105)
# docs/research/rxiv-agentic-papers.md — auto-generated paper index; arxiv links grow weekly
exclude_path = ["triage/", "docs/archive/", "docs/research/rxiv-agentic-papers.md"]

# Accept common bot-blocked status codes
# 405 = HEAD method not allowed (status pages often reject HEAD)
# 418 = I'm a teapot (freedesktop.org bot-block)
accept = [200, 204, 429, 405, 418, 202, 415]

# Retry transient failures (GitHub 502s, network blips) — see AGENT_LEARNINGS.md
max_retries = 3
retry_wait_time = 2

# Exclude domains that block automated requests (return 403/401 to HEAD)
exclude = [
    "medium.com",
    "npmjs.com",
    "cuttlesoft.com",
    "linearb.io",
    "hashicorp.com",
    "epam.com",
    "thectoclub.com",
    "blogs.oracle.com",
    "netsuite.com",
    "mcp.stripe.com",
    "dl.acm.org",
    "oxford.universitypressscholarship.com",
    "agentverse.ai",
    "crunchbase.com",
    "openreview.net",
    "scite.ai",
    # Bot-blocking / Cloudflare-protected
    "reddit.com",
    "substack.com",
    "blog.jetbrains.com",
    "neptune.ai",
    "openai.com",  # 403 to HEAD on /index/* article URLs
    "code2tutorial.com",  # 404 to HEAD; root may anti-bot — referenced in cc-community landscape
    "techcommunity.microsoft.com",  # 403 to HEAD on /blog/* URLs (anti-bot)
    "datacamp.com",  # 403 to HEAD (anti-bot) on /tutorial/* URLs — referenced in CC-version-pinning-resilience.md
    "zread.ai",  # 403 to all automated requests (Cloudflare); AI doc-reader of GitHub repos — referenced in CC-agent-teams-orchestration.md
    # Auth-gated (requires login) — both `/code` and `/code/scheduled` and `/settings/*` return 403 to anonymous requests
    "claude.ai/code",
    "claude.ai/settings",
    # HF Space outage 2026-04 — re-check periodically; underlying paper is still cited in autoagent-analysis.md
    "gaia-benchmark-leaderboard.hf.space",
    # Timeout-prone marketing sites (heavy JS homepages or JS-rendered)
    "agentskills.io",
    "e2b.dev",
    "modelcontextprotocol.io",
    "devin.ai",
    "cognition.ai",
    "deepwiki.com",
    "minbook.dev",
    "emdash.dev",
    "apmdigest.com",  # valid (200) but slow — times out lychee even with retries
    "techsy.io",  # valid but slow — times out in CI (community coverage link in CC-agent-teams-orchestration.md; sibling minbook.dev already excluded)
    # Research-discovery + observability tools that 403/timeout to lychee (browser-OK)
    "scispace.com",  # 403 to automated requests — CC-research-agents-landscape.md
    "perplexity.ai",  # 403 to HEAD on /academic — CC-research-agents-landscape.md
    "qa.allen.ai",  # Ai2 Scholar QA — times out lychee — CC-research-agents-landscape.md
    "langtrace.ai",  # 404 to root (site relocated?) — pre-existing Langtrace entry in CC-agent-observability-methods-analysis.md; revisit/update URL
    # PR #248 — bot-blocked / protocol-incompatible to lychee (browser-OK)
    "iso.org",  # 403 to HEAD (anti-bot) — pre-existing in CC-ai-security-governance-analysis.md
    "lens.org",  # 403 to automated requests — web-scraping-extraction-landscape.md (migrated catalog)
    "epo.org",  # HTTP/2 protocol error to lychee — web-scraping-extraction-landscape.md (migrated catalog)
    "codebuddy.ai",  # geo/IP-blocks CI (302 -> /banned); real site is browser-OK — codebuddy-analysis.md
    "api.semanticscholar.org",  # SSL cert expired upstream (persists) — pre-existing in CC-research-agents-landscape.md; drop this exclude once renewed
    "orbisius.com",  # 500 to lychee (persists) — pre-existing third-party blog link in CC-error-messages-reference.md
]
