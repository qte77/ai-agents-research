---
name: bump-my-version

# Manually-triggered version bump. Runs the bump-my-version + scriv CLIs via
# `pipx run` (ephemeral, pre-installed on GitHub runners) — this repo ships no
# Python package and no uv project, so there is nothing to install or lock.
# Behavior: bumps current_version in pyproject.toml, collects changelog.d/
# fragments into CHANGELOG.md, pushes a bump-<run>-<base> branch, and opens a PR
# for review. Tagging is deferred to tag-release.yaml (fires on push-to-main) so
# the v{new} tag points at the squash-merge commit reachable from main.

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Semver part to bump"
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write
  pull-requests: write

env:
  BRANCH_NEW: bump-${{ github.run_number }}-${{ github.ref_name }}

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Configure git + branch
        env:
          BRANCH: ${{ env.BRANCH_NEW }}
        run: |
          set -euo pipefail
          git config user.email "bumped@qte77.gha"
          git config user.name "bump-my-version"
          git checkout -b "$BRANCH"

      - name: Run bump-my-version
        id: bump
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          set -euo pipefail
          PREV_VERSION=$(pipx run bump-my-version show current_version)
          # --no-tag: tag-release.yaml creates the annotated tag against main's
          # squash-merge commit, so the tag is always reachable from main.
          pipx run bump-my-version bump --no-tag "$BUMP_TYPE"
          NEW_VERSION=$(pipx run bump-my-version show current_version)
          {
            echo "prev_version=$PREV_VERSION"
            echo "new_version=$NEW_VERSION"
            echo "bumped=true"
          } >> "$GITHUB_OUTPUT"

      - name: Collect changelog fragments
        if: steps.bump.outputs.bumped == 'true'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          set -euo pipefail
          if compgen -G 'changelog.d/*.md' > /dev/null; then
            pipx run --spec 'scriv[toml]' scriv collect --version "$NEW_VERSION"
            git add CHANGELOG.md changelog.d/
            git commit -m "docs(changelog): collect fragments for $NEW_VERSION"
          else
            echo "no changelog fragments to collect"
          fi

      - name: Push branch
        if: steps.bump.outputs.bumped == 'true'
        env:
          BRANCH: ${{ env.BRANCH_NEW }}
        run: |
          set -euo pipefail
          git push origin "HEAD:refs/heads/$BRANCH"

      - name: Open release PR
        if: steps.bump.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_BRANCH: ${{ github.ref_name }}
          HEAD_BRANCH: ${{ env.BRANCH_NEW }}
          PREV_VERSION: ${{ steps.bump.outputs.prev_version }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          set -euo pipefail
          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$HEAD_BRANCH" \
            --title "chore(release): bump $PREV_VERSION -> $NEW_VERSION" \
            --body "Automated bump via bump-my-version.yaml workflow_dispatch. Updates current_version in pyproject.toml and collects changelog.d/ fragments into CHANGELOG.md. The v$NEW_VERSION tag is created by tag-release.yaml after this PR is squash-merged to main."
