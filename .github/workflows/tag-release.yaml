---
name: tag-release

# Watches main for pyproject.toml version changes (the squash-merge of a
# bump-my-version release PR) and creates the annotated `v$NEW` tag against the
# actual main commit. Pairs with bump-my-version.yaml, which runs with --no-tag
# so the tag is reachable from main rather than orphaned on the bump branch.

on:
  push:
    branches: [main]
    paths: ['pyproject.toml']

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 2  # HEAD + parent so we can diff the version line

      - name: Detect version bump
        id: detect
        run: |
          set -euo pipefail
          NEW=$(grep -m1 '^current_version = ' pyproject.toml | sed -E 's/current_version = "(.*)"/\1/')
          if ! git cat-file -e "HEAD^:pyproject.toml" 2>/dev/null; then
            echo "pyproject.toml newly added in this commit; nothing to tag"
            exit 0
          fi
          OLD=$(git show "HEAD^:pyproject.toml" | grep -m1 '^current_version = ' | sed -E 's/current_version = "(.*)"/\1/')
          if [ "$NEW" = "$OLD" ]; then
            echo "no version change ($OLD == $NEW); nothing to tag"
            exit 0
          fi
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "bumped=true" >> "$GITHUB_OUTPUT"

      - name: Create + push annotated tag
        if: steps.detect.outputs.bumped == 'true'
        env:
          NEW: ${{ steps.detect.outputs.new }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/v$NEW" >/dev/null; then
            echo "tag v$NEW already exists at $(git rev-parse "v$NEW"); aborting"
            exit 1
          fi
          git config user.email "release-tag@qte77.gha"
          git config user.name "tag-release"
          git tag -a -m "Release v$NEW" "v$NEW"
          git push origin "v$NEW"
