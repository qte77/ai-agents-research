name: Community Monitor

on:
  schedule:
    - cron: '0 10 * * 3'  # Weekly on Wednesday, 1h after native changelog monitor
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  monitor:
    name: Check community sources for new CC content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run community monitor
        id: monitor
        run: |
          set +e
          python .github/scripts/community-monitor.py \
            --community-docs-dir docs/community/ \
            --state-file .github/state/community-monitor-state.json \
            > /tmp/report.md 2>/tmp/monitor-stderr.txt
          EXIT_CODE=$?
          set -e

          cat /tmp/monitor-stderr.txt >&2

          if [ $EXIT_CODE -eq 1 ]; then
            echo "new_content=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_content=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch and PR for new community content
        if: steps.monitor.outputs.new_content == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/community-triage-$(date -u +%Y-%m-%d)"
          DATE_STAMP=$(date -u +%Y-%m-%d)

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create branch
          git checkout -b "$BRANCH"

          # Copy report to repo
          cp /tmp/report.md "docs/community/community-triage-${DATE_STAMP}.md"

          # Stage report and updated state file
          git add "docs/community/community-triage-${DATE_STAMP}.md"
          git add .github/state/community-monitor-state.json

          git commit -m "chore: community triage ${DATE_STAMP}

          Auto-generated by community-monitor workflow."

          git push origin "$BRANCH"

          # Build PR body
          {
            echo "## Community Monitor: New Uncovered Content Detected"
            echo ""
            echo "_Auto-generated by community-monitor. Review, update community docs, then merge._"
            echo ""
            echo "Sources monitored:"
            echo "- [claudelog.com](https://claudelog.com/claude-code-changelog/)"
            echo "- [awesome-claude-code](https://github.com/hesreallyhim/awesome-claude-code)"
            echo "- [awesome-claude-code-plugins](https://github.com/ccplugins/awesome-claude-code-plugins)"
            echo ""
            cat /tmp/report.md
          } > /tmp/pr-body.md

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: community triage ${DATE_STAMP}" \
            --body-file /tmp/pr-body.md
