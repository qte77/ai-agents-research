# Aggregates AGENT_LEARNINGS.md files from mapped qte77 repos into
# docs/learnings/per-repo/. Opens a PR when any per-repo file changes.
# Output: docs/learnings/per-repo/*.md + .github/state/learnings-aggregator-state.json
name: Learnings Aggregator

on:
  schedule:
    - cron: '0 11 * * 1'  # Weekly Monday 11:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  aggregate:
    name: Aggregate per-repo AGENT_LEARNINGS.md
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Aggregate learnings
        id: aggregate
        run: |
          set +e
          python .github/scripts/learnings-aggregator.py
          echo "changed=$( [ $? -eq 1 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Create triage PR
        if: steps.aggregate.outputs.changed == 'true'
        uses: ./.github/actions/create-triage-pr
        with:
          branch-prefix: chore/learnings-aggregation
          extra-files: docs/learnings/per-repo/ .github/state/learnings-aggregator-state.json
          skip-report: 'true'
          pr-title-prefix: 'chore: learnings aggregation'
          pr-body-header: 'Per-Repo AGENT_LEARNINGS Update'
          pr-body-note: 'Auto-generated by learnings-aggregator. Mirrors AGENT_LEARNINGS.md from source qte77 repos into docs/learnings/per-repo/.'
