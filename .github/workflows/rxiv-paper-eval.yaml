# Auth posture (deliberate): no PAT. The reusable workflow's `models-token`
# secret is intentionally not wired, so it falls back to GITHUB_TOKEN whose
# Models quota is small and org-shared. Expect any non-trivial weekly batch
# to 429; the script treats >50% failures as a broken run (exit 2).
# Eval is best-effort by design — the trade is no PAT-rotation surface vs
# intermittent empty artifacts. The triage job is skipped when the eval
# returns zero relevant papers (either by design or by quota exhaustion),
# so empty PRs never land.
name: rxiv weekly eval

on:
  # Tuesday 09:00 UTC — one day after the existing Monday changelog/community/
  # status monitors so the eval doesn't compete for the shared GitHub Models
  # quota in the same window.
  schedule:
    - cron: "0 9 * * 2"
  # Self-runs on PRs editing the workflow itself, capped at 5 papers so
  # workflow edits don't burn the no-PAT Models quota the Tuesday cron uses.
  # The triage job is also skipped on pull_request triggers (see `if:` below).
  pull_request:
    paths:
      - .github/workflows/rxiv-paper-eval.yaml
  workflow_dispatch:
    inputs:
      server:
        description: "Preprint server."
        type: choice
        options: [arxiv, biorxiv, medrxiv]
        default: arxiv
      week:
        description: "ISO week (1-53). Empty = current."
        type: string
        default: ""
      year:
        description: "ISO year (YYYY). Empty = current."
        type: string
        default: ""
      max_papers:
        description: "Cap rows sent to the LLM. 0 = no cap."
        type: string
        default: "50"

permissions:
  contents: read
  models: read

jobs:
  resolve:
    name: Resolve latest available feed week
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      year: ${{ steps.pick.outputs.year }}
      week: ${{ steps.pick.outputs.week }}
    steps:
      - name: Pick latest available week from the feed repo
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
          SERVER: ${{ inputs.server || vars.RXIV_SERVER || 'arxiv' }}
          FEED_REPO: ${{ vars.RXIV_FEED_REPO || format('{0}/gha-rxiv-feed-action', github.repository_owner) }}
          YEAR_INPUT: ${{ inputs.year }}
          WEEK_INPUT: ${{ inputs.week }}
        run: |
          set -euo pipefail
          # An explicit dispatch week wins — pass it straight through.
          if [ -n "$WEEK_INPUT" ]; then
            echo "year=${YEAR_INPUT:-$(date -u +%G)}" >> "$GITHUB_OUTPUT"
            echo "week=$WEEK_INPUT" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Otherwise resolve the newest week the feed ACTUALLY has, so a feed
          # that lags the calendar week doesn't 404 the eval. Try the target
          # year, then fall back to the prior year (early-January boundary).
          latest_week() {
            gh api "repos/${FEED_REPO}/contents/data/${SERVER}/$1" \
              --jq '[.[].name | select(endswith(".csv")) | rtrimstr(".csv")] | sort_by(tonumber) | last // empty' \
              2>/dev/null || true
          }
          year="${YEAR_INPUT:-$(date -u +%G)}"
          week="$(latest_week "$year")"
          if [ -z "$week" ]; then
            year="$((year - 1))"
            week="$(latest_week "$year")"
          fi
          if [ -z "$week" ]; then
            echo "::error::No feed CSVs found for ${SERVER} in ${FEED_REPO}"
            exit 1
          fi
          echo "Resolved latest available feed week: ${year} W${week}"
          echo "year=${year}" >> "$GITHUB_OUTPUT"
          echo "week=${week}" >> "$GITHUB_OUTPUT"

  eval:
    needs: resolve
    uses: qte77/gha-rxiv-paper-eval/.github/workflows/eval-papers.yaml@c748a066744876b4ef07ca28cc072f8b41449555  # v0.4.0
    with:
      server: ${{ inputs.server || vars.RXIV_SERVER || 'arxiv' }}
      topic: ${{ vars.RXIV_TOPIC || 'LLM-based autonomous agents, tool use and function calling, multi-agent coordination, agentic evaluation and benchmarking, and LLM reasoning and planning' }}
      # Use the script's DEFAULT_RELEVANCE_PROMPT (its "methodology transferable"
      # language already covers AI-agent methodology papers across domains).
      relevance_prompt: ""
      # No-op for arxiv (no Category column in feed CSV); only meaningful if
      # dispatching biorxiv/medrxiv runs.
      categories: ${{ vars.RXIV_CATEGORIES || '' }}
      year: ${{ needs.resolve.outputs.year }}
      week: ${{ needs.resolve.outputs.week }}
      max_papers: ${{ github.event_name == 'pull_request' && 5 || fromJSON(inputs.max_papers || '50') }}
      model: openai/gpt-4o-mini
      enrich: true
      eval_repo: qte77/gha-rxiv-paper-eval
      eval_ref: c748a066744876b4ef07ca28cc072f8b41449555  # v0.4.0 — keep in lockstep with the workflow pin above (qte77/gha-rxiv-paper-eval#80)

  triage:
    needs: [resolve, eval]
    if: ${{ github.event_name != 'pull_request' && fromJSON(needs.eval.outputs.relevant_count || '0') > 0 }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '20'

      - name: Download eval artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ needs.eval.outputs.artifact_name }}
          path: eval-output

      - name: Assemble triage report
        run: |
          set -euo pipefail
          # Strip eval's own leading H1 (create-triage-pr prepends its own,
          # would violate MD025) and any leading blank lines that would
          # collide with the action's prepend (MD012 — double blank).
          # Demote in-body H1s to H2 as a belt-and-suspenders guard.
          {
            sed -E '1{/^# /d;}; s/^# (.*)$/## \1/' eval-output/summary.md \
              | sed '/./,$!d'
            echo ""
            echo "## Extracts"
            echo ""
            python3 - <<'PY'
          import json, pathlib
          for line in pathlib.Path("eval-output/extracts.jsonl").read_text().splitlines():
              if not line.strip():
                  continue
              d = json.loads(line)
              ex = d.get("extracted", {})
              # Blank line below heading and around lists is required
              # (MD022 / MD032).
              print(f"### {d.get('title', '(no title)')}")
              print()
              doi = d.get("doi", "")
              if doi:
                  print(f"- arxiv: <https://arxiv.org/abs/{doi}>")
              if ex.get("summary"):
                  print(f"- summary: {ex['summary']}")
              if ex.get("methods"):
                  print(f"- methods: {', '.join(ex['methods'])}")
              if ex.get("key_findings"):
                  print(f"- findings: {'; '.join(ex['key_findings'])}")
              print()
          PY
          } > /tmp/report.md
          # Collapse runs of blank lines to one (MD012) and trim leading/
          # trailing blanks so the action's prepend produces clean output.
          awk 'BEGIN{blank=0;started=0} /^$/{blank=1;next} {if(started&&blank)print ""; started=1; blank=0; print}' /tmp/report.md > /tmp/report.md.clean
          mv /tmp/report.md.clean /tmp/report.md

      - name: Derive run key
        # Key the dedup on the actually-evaluated week (resolved from the feed
        # in the resolve job), so re-runs on a different UTC day don't open a
        # duplicate PR and the key matches the week the eval really used.
        id: key
        env:
          SERVER_INPUT: ${{ inputs.server }}
          SERVER_VAR: ${{ vars.RXIV_SERVER }}
          RESOLVED_YEAR: ${{ needs.resolve.outputs.year }}
          RESOLVED_WEEK: ${{ needs.resolve.outputs.week }}
        run: |
          set -euo pipefail
          SERVER="${SERVER_INPUT:-${SERVER_VAR:-arxiv}}"
          echo "key=${SERVER}-${RESOLVED_YEAR}-W${RESOLVED_WEEK}" >> "$GITHUB_OUTPUT"

      - name: Check dedup state
        # Hash /tmp/report.md and compare against the committed fingerprint
        # for this run key. Skip downstream lint + PR steps when unchanged
        # so re-dispatching with the same params on a different UTC day
        # doesn't open a duplicate PR.
        id: dedup
        env:
          KEY: ${{ steps.key.outputs.key }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib, json, os, pathlib
          report = pathlib.Path("/tmp/report.md").read_bytes()
          fp = hashlib.sha256(report).hexdigest()[:16]
          state_file = pathlib.Path(".github/state/rxiv-paper-eval-state.json")
          if state_file.exists() and state_file.read_text().strip():
              state = json.loads(state_file.read_text())
          else:
              state = {}
          key = os.environ["KEY"]
          unchanged = state.get(key) == fp
          state[key] = fp
          state_file.parent.mkdir(parents=True, exist_ok=True)
          state_file.write_text(json.dumps(state, indent=2, sort_keys=True) + "\n")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"unchanged={'true' if unchanged else 'false'}\n")
          print(f"key={key} fingerprint={fp} unchanged={unchanged}")
          PY

      - name: Lint assembled report
        if: steps.dedup.outputs.unchanged != 'true'
        # Simulate create-triage-pr's H1 prepend then lint with the repo's
        # .markdownlint.json. Fails the job (and prevents an opening PR) if
        # the assembled output would land md-lint-dirty.
        env:
          PR_BODY_HEADER: 'ArXiv AI Agents: Relevant Papers'
        run: |
          set -euo pipefail
          {
            echo "# ${PR_BODY_HEADER}"
            echo ""
            cat /tmp/report.md
          } > /tmp/final.md
          make setup_mdlint
          export PATH="$HOME/.local/share/node/bin:$PATH"
          markdownlint-cli2 --config .markdownlint.json /tmp/final.md

      - name: Persist results and rebuild cumulative index
        if: steps.dedup.outputs.unchanged != 'true'
        # Persist the run's structured extracts as reusable data and regenerate
        # the cumulative index from all accumulated weeks. Both land in the same
        # triage PR via create-triage-pr's extra-files. Lint the index so a bad
        # entry fails here rather than landing md-lint-dirty.
        env:
          KEY: ${{ steps.key.outputs.key }}
        run: |
          set -euo pipefail
          mkdir -p triage/rxiv/data
          cp eval-output/extracts.jsonl "triage/rxiv/data/${KEY}.jsonl"
          python3 .github/scripts/build-rxiv-index.py \
            --data-dir triage/rxiv/data \
            --out docs/research/rxiv-agentic-papers.md
          export PATH="$HOME/.local/share/node/bin:$PATH"
          markdownlint-cli2 --config .markdownlint.json docs/research/rxiv-agentic-papers.md

      - name: Create triage PR
        if: steps.dedup.outputs.unchanged != 'true'
        uses: ./.github/actions/create-triage-pr
        with:
          branch-prefix: chore/rxiv-paper-triage
          report-dest: triage/rxiv/papers
          extra-files: >-
            .github/state/rxiv-paper-eval-state.json
            triage/rxiv/data/${{ steps.key.outputs.key }}.jsonl
            docs/research/rxiv-agentic-papers.md
          pr-title-prefix: 'chore: rxiv paper triage'
          pr-body-header: 'ArXiv AI Agents: Relevant Papers'
          pr-body-note: 'Auto-generated by rxiv-paper-eval. File relevant papers into docs/ or close if covered.'
