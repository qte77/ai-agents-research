# Auth posture (deliberate): no PAT. The reusable workflow's `models-token`
# secret is intentionally not wired, so it falls back to GITHUB_TOKEN whose
# Models quota is small and org-shared. Expect any non-trivial weekly batch
# to 429; the script treats >50% failures as a broken run (exit 2).
# Eval is best-effort by design — the trade is no PAT-rotation surface vs
# intermittent empty artifacts. The triage job is skipped when the eval
# returns zero relevant papers (either by design or by quota exhaustion),
# so empty PRs never land.
name: rxiv weekly eval

on:
  # Tuesday 09:00 UTC — one day after the existing Monday changelog/community/
  # status monitors so the eval doesn't compete for the shared GitHub Models
  # quota in the same window.
  schedule:
    - cron: "0 9 * * 2"
  # Self-runs on PRs editing the workflow itself, capped at 5 papers so
  # workflow edits don't burn the no-PAT Models quota the Tuesday cron uses.
  # The triage job is also skipped on pull_request triggers (see `if:` below).
  pull_request:
    paths:
      - .github/workflows/rxiv-paper-eval.yaml
  workflow_dispatch:
    inputs:
      server:
        description: "Preprint server."
        type: choice
        options: [arxiv, biorxiv, medrxiv]
        default: arxiv
      week:
        description: "ISO week (1-53). Empty = current."
        type: string
        default: ""
      year:
        description: "ISO year (YYYY). Empty = current."
        type: string
        default: ""
      max_papers:
        description: "Cap rows sent to the LLM. 0 = no cap."
        type: string
        default: "50"

permissions:
  contents: read
  models: read

jobs:
  eval:
    uses: qte77/gha-rxiv-paper-eval/.github/workflows/eval-papers.yaml@6a4bb87ea02a9bfbb837fa7d500eec0d9c24172f  # v0.2.2
    with:
      server: ${{ inputs.server || vars.RXIV_SERVER || 'arxiv' }}
      topic: ${{ vars.RXIV_TOPIC || 'LLM-based autonomous agents, tool use and function calling, multi-agent coordination, agentic evaluation and benchmarking, and LLM reasoning and planning' }}
      # Use the script's DEFAULT_RELEVANCE_PROMPT (its "methodology transferable"
      # language already covers AI-agent methodology papers across domains).
      relevance_prompt: ""
      # No-op for arxiv (no Category column in feed CSV); only meaningful if
      # dispatching biorxiv/medrxiv runs.
      categories: ${{ vars.RXIV_CATEGORIES || '' }}
      year: ${{ inputs.year || '' }}
      week: ${{ inputs.week || '' }}
      max_papers: ${{ github.event_name == 'pull_request' && 5 || fromJSON(inputs.max_papers || '50') }}
      model: openai/gpt-4o-mini
      enrich: true
      eval_repo: qte77/gha-rxiv-paper-eval
      eval_ref: 6a4bb87ea02a9bfbb837fa7d500eec0d9c24172f  # v0.2.2

  triage:
    needs: eval
    if: ${{ github.event_name != 'pull_request' && fromJSON(needs.eval.outputs.relevant_count || '0') > 0 }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download eval artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.eval.outputs.artifact_name }}
          path: eval-output

      - name: Assemble triage report
        run: |
          set -euo pipefail
          {
            cat eval-output/summary.md
            echo ""
            echo "## Extracts"
            echo ""
            python3 - <<'PY'
          import json, pathlib
          for line in pathlib.Path("eval-output/extracts.jsonl").read_text().splitlines():
              if not line.strip():
                  continue
              d = json.loads(line)
              ex = d.get("extracted", {})
              print(f"### {d.get('title', '(no title)')}")
              doi = d.get("doi", "")
              if doi:
                  print(f"- arxiv: <https://arxiv.org/abs/{doi}>")
              if ex.get("summary"):
                  print(f"- summary: {ex['summary']}")
              if ex.get("methods"):
                  print(f"- methods: {', '.join(ex['methods'])}")
              if ex.get("key_findings"):
                  print(f"- findings: {'; '.join(ex['key_findings'])}")
              print()
          PY
          } > /tmp/report.md

      - name: Create triage PR
        uses: ./.github/actions/create-triage-pr
        with:
          branch-prefix: chore/rxiv-paper-triage
          report-dest: triage/rxiv/papers
          pr-title-prefix: 'chore: rxiv paper triage'
          pr-body-header: 'ArXiv AI Agents: Relevant Papers'
          pr-body-note: 'Auto-generated by rxiv-paper-eval. File relevant papers into docs/ or close if covered.'
