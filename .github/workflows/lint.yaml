# Runs markdownlint-cli2 and lychee via existing Makefile targets.
# TODO: extract into a standalone reusable action (gha-md-lychee) — see issue.
name: Lint

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - 'lychee.toml'
      - 'Makefile'
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - 'lychee.toml'
      - 'Makefile'
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown lint (markdownlint-cli2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: make setup_mdlint

      - name: Run markdownlint
        run: make check_docs

  links:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Cache lychee binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.local/bin/lychee
          # Bump suffix (v1 -> v2) to force a fresh lychee download
          key: lychee-${{ runner.os }}-v1

      - name: Install lychee
        run: make setup_lychee

      - name: Run lychee
        run: make check_links

  actions:
    name: Action lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install actionlint
        run: make setup_actionlint

      - name: Run actionlint
        run: make check_actions
